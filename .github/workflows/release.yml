name: Release

# Dispara quando você cria uma tag (ex: v0.11.0).
# O packager empacota o addon e publica no CurseForge (e cria um Release no GitHub).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Clone do projeto
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # histórico completo -> changelog automático entre tags

      - name: Empacotar e publicar
        uses: BigWigsMods/packager@v2
        env:
          # Token da CurseForge (Settings > Secrets and variables > Actions > New repository secret)
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          # Cria o Release no GitHub e anexa o .zip — usa o token automático do Actions
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
          # --- Outras plataformas (opcional, descomente quando tiver os tokens) ---
          # WOWI_API_TOKEN: ${{ secrets.WOWI_API_TOKEN }}   # WoWInterface
          # WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}   # Wago Addons
