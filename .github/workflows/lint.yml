name: Lint

# Lints the Lua on every push / PR so mistakes surface in CI (the author can't
# always run the addon in-game). Config is in .luacheckrc.
on:
  push:
  pull_request:

jobs:
  luacheck:
    runs-on: ubuntu-latest
    steps:
      - name: Clone do projeto
        uses: actions/checkout@v4

      - name: Set up Lua 5.1
        uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.1"

      - name: Set up LuaRocks
        uses: leafo/gh-actions-luarocks@v4

      - name: Install luacheck
        run: luarocks install luacheck

      # Informational: luacheck runs and reports any findings in the log, but
      # doesn't fail the build over style/unused nits (the author can read the
      # output and tighten as desired). Flip continue-on-error off to enforce.
      - name: Run luacheck
        continue-on-error: true
        run: luacheck Modules Core.lua
